<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            padding: 100px 50px;
            background: #9b7af5;
            background: linear-gradient(126deg, rgba(155, 122, 245, 1) 41%, rgba(102, 94, 255, 1) 54%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box1 {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background-color: white;
            width: 500px;
            height: 600px;
            border-radius: 10px;
            padding: 20px;
        }

        #nome {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 30px;
        }

        #area {
            font-family: Arial, Helvetica, sans-serif;
            padding-top: 10px;
            color: #9b7af5;
        }

        #o-que-faz {
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(119, 119, 119);
        }

        ul li {
            list-style: none;
            
        }
    </style>
</head>

<body>
    <div class="box1">
        <div class="img">
            <img src="img/Captura de tela 2026-04-15 212449.png" alt="">
        </div>
        <div class="nome-area">
            <h1 id="nome">Adryan Silva</h1>
            <p id="area">Desenvolvedor Front-End</p>
        </div>
        <div class="o-que-faz">
            <p id="o-que-faz">Apaixonado por criar experiências digitas incríveis. Especialista em HTML, CSS e JavaScript com foco em
                interfaces modernas e responsivas.</p>
        </div>
        <div class="habilidades">
            <h2>Habilidades</h2>
            <ul>
                <li>HTML5</li>
                <li>CSS3</li>
                <li>JavaScript</li>
                <li>Flexbox</li>
            </ul>
        </div>
        <button>
            Entre em Contato
        </button>
    </div>
</body>

</html>
