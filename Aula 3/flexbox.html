<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            padding: 50px 50px;
        }

        .box1 {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            background-color: blue;
            width: 700px;
            height: 400px;
        }

        #titulo-principal {
            color: white;
        }

        ul {
            display: flex;
            gap: 30px;
        }

        ul li {
            list-style: none;
            font-size: 1.5rem;
        }

        a {
            color: #a79e9e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-decoration: none;
        }

        a:hover {
            color: aqua;
            text-decoration: underline;
            font-weight: 600;
        }
    </style>

</head>

<body>
    <div class="box1">
        <h1 id="titulo-principal">FlexBox</h1>
        <h2 id="titulo-principal">FlexBox2</h2>
        <h3 id="titulo-principal">FlexBox3</h3>
        <h4 id="titulo-principal">FlexBox4</h4>
        <h5 id="titulo-principal">FlexBox5</h5>

    </div>

    <div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Service</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </div>
</body>

</html>
